<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Interview | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --primary: #00ff41;
            --primary-glow: rgba(0, 255, 65, 0.3);
            --text: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
        }

        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            animation: pulse 4s infinite alternate;
        }

        @keyframes pulse {
            from { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            to { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
        }

        .container {
            max-width: 600px;
            padding: 20px;
        }

        .tag {
            display: inline-block;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 30px;
        }

        h1 {
            font-size: 80px;
            font-weight: 800;
            line-height: 0.9;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }

        p {
            font-size: 18px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .btn {
            display: inline-block;
            background: var(--primary);
            color: black;
            text-decoration: none;
            padding: 14px 36px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px var(--primary-glow);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px var(--primary-glow);
            filter: brightness(1.1);
        }

        .status {
            position: fixed;
            bottom: 40px;
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="container">
        <span class="tag">Hiero AI</span>
        <h1>COMING<br>SOON</h1>
        <p>Our intelligent mock interview system is currently in final testing. Get ready to transform your interview performance with voice-activated AI coaching.</p>
        <a href="/index.html" class="btn">Back to Dashboard</a>
    </div>
    <div class="status">Development Stage: Final Integration</div>
</body>
</html>
