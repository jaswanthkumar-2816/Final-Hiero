<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Reel Creator — Hiero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #000000;
      --c1: rgba(15, 15, 15, .85);
      --c2: rgba(22, 22, 22, .95);
      --green: #06e506;
      --t1: #e8f4ff;
      --t2: #8ba5c5;
      --t3: #4a6280;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--t1);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      background-image: 
        radial-gradient(ellipse at 0% 0%, rgba(0, 230, 118, .1) 0%, transparent 40%),
        radial-gradient(ellipse at 100% 10%, rgba(0, 230, 118, .05) 0%, transparent 45%);
    }

    .container {
      max-width: 800px;
      width: 100%;
      background: var(--c1);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 32px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #fff 0%, var(--green) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: var(--t2);
      margin-bottom: 32px;
      font-size: 16px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      color: var(--t2);
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    input, textarea, select {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px 16px;
      color: #fff;
      font-family: inherit;
      font-size: 15px;
      transition: all 0.2s;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--green);
      background: rgba(0, 230, 118, 0.05);
    }

    .btn-generate {
      width: 100%;
      background: var(--green);
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      margin-top: 10px;
    }

    .btn-generate:hover {
      transform: scale(1.02);
      box-shadow: 0 0 20px rgba(6, 229, 6, 0.4);
    }

    .btn-generate:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .result-area {
      margin-top: 40px;
      display: none;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 24px;
      position: relative;
    }

    .result-content {
      color: var(--t1);
      font-size: 15px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .copy-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--t2);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      background: var(--green);
      color: #000;
    }

    .loader {
      display: none;
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top: 3px solid var(--green);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .back-link {
      margin-top: 24px;
      color: var(--t3);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: var(--green);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🚀 Reel Creator</h1>
    <p class="subtitle">Generate viral scripts and captions using Hiero's Groq AI.</p>

    <div class="form-group">
      <label>What's the reel about?</label>
      <textarea id="topic" rows="3" placeholder="e.g. A 30-second script for a resume builder app called Hiero. Keep it professional yet engaging."></textarea>
    </div>

    <div class="form-group">
      <label>Target Audience</label>
      <input type="text" id="audience" placeholder="e.g. Job seekers, College students, Tech professionals" />
    </div>

    <button id="generateBtn" class="btn-generate">Generate Script & Captions</button>

    <div id="loader" class="loader"></div>

    <div id="resultArea" class="result-area">
      <div class="result-card">
        <div style="display: flex; gap: 10px; position: absolute; top: 16px; right: 16px;">
          <button id="ttsBtn" class="copy-btn" style="position: static; background: rgba(0, 212, 255, 0.1); border-color: rgba(0, 212, 255, 0.2); color: var(--cyan);">Convert to Speech</button>
          <button id="copyBtn" class="copy-btn" style="position: static;">Copy Script</button>
        </div>
        <div id="resultContent" class="result-content"></div>
      </div>
    </div>
  </div>

  <a href="/project.html" class="back-link">← Back to Dashboard</a>

  <script>
    const generateBtn = document.getElementById('generateBtn');
    const topicInput = document.getElementById('topic');
    const audienceInput = document.getElementById('audience');
    const loader = document.getElementById('loader');
    const resultArea = document.getElementById('resultArea');
    const resultContent = document.getElementById('resultContent');
    const ttsBtn = document.getElementById('ttsBtn');
    const copyBtn = document.getElementById('copyBtn');

    ttsBtn.addEventListener('click', () => {
      const text = resultContent.innerText;
      localStorage.setItem('tts_input', text);
      window.location.href = '/public/tts-converter/index.html';
    });

    generateBtn.addEventListener('click', async () => {
      const topic = topicInput.value.trim();
      const audience = audienceInput.value.trim();

      if (!topic) {
        alert('Please enter a topic!');
        return;
      }

      generateBtn.disabled = true;
      loader.style.display = 'block';
      resultArea.style.display = 'none';

      try {
        const response = await fetch('/api/reel/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ topic, audience })
        });

        const data = await response.json();
        
        if (data.success) {
          resultContent.innerHTML = marked.parse(data.content);
          resultArea.style.display = 'block';
        } else {
          alert('Error: ' + (data.error || 'Failed to generate script'));
        }
      } catch (error) {
        console.error('Error:', error);
        alert('Something went wrong. Is the server running?');
      } finally {
        generateBtn.disabled = false;
        loader.style.display = 'none';
      }
    });

    copyBtn.addEventListener('click', () => {
      const text = resultContent.innerText;
      navigator.clipboard.writeText(text).then(() => {
        copyBtn.textContent = 'Copied!';
        setTimeout(() => copyBtn.textContent = 'Copy Script', 2000);
      });
    });
  </script>
</body>
</html>
