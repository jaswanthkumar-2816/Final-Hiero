<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>TTS Converter — Hiero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --c1: rgba(15, 15, 15, .85);
      --c2: rgba(22, 22, 22, .95);
      --green: #06e506;
      --cyan: #00d4ff;
      --t1: #e8f4ff;
      --t2: #8ba5c5;
      --t3: #4a6280;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--t1);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      background-image: 
        radial-gradient(ellipse at 0% 0%, rgba(0, 230, 118, .1) 0%, transparent 40%),
        radial-gradient(ellipse at 100% 10%, rgba(0, 212, 255, .05) 0%, transparent 45%);
    }

    .container {
      max-width: 800px;
      width: 100%;
      background: var(--c1);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 32px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #fff 0%, var(--cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: var(--t2);
      margin-bottom: 32px;
      font-size: 16px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      color: var(--t2);
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 16px;
      color: #fff;
      font-family: inherit;
      font-size: 15px;
      line-height: 1.6;
      min-height: 200px;
      resize: vertical;
      transition: all 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: var(--cyan);
      background: rgba(0, 212, 255, 0.05);
    }

    .controls-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    select, input[type="range"] {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 10px;
      color: #fff;
      font-size: 14px;
    }

    .btn-play {
      width: 100%;
      background: var(--cyan);
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-play:hover {
      transform: scale(1.02);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
    }

    .visualizer {
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      margin-top: 20px;
      overflow: hidden;
      display: none;
    }

    .visualizer-bar {
      height: 100%;
      width: 0%;
      background: var(--cyan);
      transition: width 0.1s linear;
    }

    .external-tools {
      margin-top: 40px;
      padding-top: 32px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .external-tools h3 {
      font-size: 14px;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    .tools-row {
      display: flex;
      gap: 12px;
    }

    .tool-link {
      flex: 1;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 12px;
      color: var(--t2);
      text-decoration: none;
      font-size: 13px;
      text-align: center;
      transition: all 0.2s;
    }

    .tool-link:hover {
      background: rgba(255,255,255,0.08);
      border-color: var(--t2);
      color: var(--t1);
    }

    .back-link {
      margin-top: 24px;
      color: var(--t3);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: var(--cyan);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🔊 TTS Converter</h1>
    <p class="subtitle">Convert your reel scripts into professional voiceovers.</p>

    <div class="form-group">
      <label>Voiceover Script</label>
      <textarea id="ttsText" placeholder="Paste your generated script here..."></textarea>
    </div>

    <div class="controls-grid">
      <div class="form-group">
        <label>Voice Selection</label>
        <select id="voiceSelect">
          <option value="">Default System Voice</option>
        </select>
      </div>
      <div class="form-group">
        <label>Speed (Rate)</label>
        <input type="range" id="rateRange" min="0.5" max="2" step="0.1" value="1" />
      </div>
    </div>

    <button id="playBtn" class="btn-play">
      <span id="playIcon">▶</span> <span id="playText">Preview Voiceover</span>
    </button>

    <div id="visualizer" class="visualizer">
      <div id="visualizerBar" class="visualizer-bar"></div>
    </div>

    <div class="external-tools">
      <h3>Pro Tools (For High-Quality Audio)</h3>
      <div class="tools-row">
        <a href="https://ttsmaker.com/" target="_blank" class="tool-link">TTSMaker (Recommended)</a>
        <a href="https://elevenlabs.io/" target="_blank" class="tool-link">ElevenLabs AI</a>
        <a href="https://cloud.google.com/text-to-speech" target="_blank" class="tool-link">Google TTS</a>
      </div>
    </div>
  </div>

  <a href="/public/reel-creator/index.html" class="back-link">← Back to Reel Creator</a>

  <script>
    const synth = window.speechSynthesis;
    const playBtn = document.getElementById('playBtn');
    const ttsText = document.getElementById('ttsText');
    const voiceSelect = document.getElementById('voiceSelect');
    const rateRange = document.getElementById('rateRange');
    const visualizer = document.getElementById('visualizer');
    const visualizerBar = document.getElementById('visualizerBar');
    const playIcon = document.getElementById('playIcon');
    const playText = document.getElementById('playText');

    let voices = [];

    function populateVoices() {
      voices = synth.getVoices();
      voiceSelect.innerHTML = voices
        .map((voice, i) => `<option value="${i}">${voice.name} (${voice.lang})</option>`)
        .join('');
    }

    if (speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.onvoiceschanged = populateVoices;
    }
    populateVoices();

    window.onload = () => {
      const savedText = localStorage.getItem('tts_input');
      if (savedText) {
        ttsText.value = savedText;
        localStorage.removeItem('tts_input'); // Clear it after use
      }
    };

    playBtn.addEventListener('click', () => {
      if (synth.speaking) {
        synth.cancel();
        stopAnimation();
        return;
      }

      const text = ttsText.value.trim();
      if (!text) return;

      const utter = new SpeechSynthesisUtterance(text);
      const selectedVoice = voices[voiceSelect.value];
      if (selectedVoice) utter.voice = selectedVoice;
      utter.rate = rateRange.value;

      utter.onstart = () => {
        startAnimation();
      };

      utter.onend = () => {
        stopAnimation();
      };

      synth.speak(utter);
    });

    function startAnimation() {
      playIcon.textContent = '⏹';
      playText.textContent = 'Stop Playback';
      visualizer.style.display = 'block';
      visualizerBar.style.width = '0%';
      
      // Fake progress animation since Web Speech API doesn't give precise progress easily
      let start = Date.now();
      const text = ttsText.value.trim();
      const estimatedDuration = (text.length / 15) / rateRange.value * 1000; // rough estimate

      const interval = setInterval(() => {
        if (!synth.speaking) {
          clearInterval(interval);
          return;
        }
        let elapsed = Date.now() - start;
        let progress = Math.min((elapsed / estimatedDuration) * 100, 100);
        visualizerBar.style.width = progress + '%';
      }, 100);
    }

    function stopAnimation() {
      playIcon.textContent = '▶';
      playText.textContent = 'Preview Voiceover';
      visualizer.style.display = 'none';
      visualizerBar.style.width = '0%';
    }
  </script>
</body>
</html>
