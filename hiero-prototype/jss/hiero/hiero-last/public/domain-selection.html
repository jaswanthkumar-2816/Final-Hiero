  <link rel="stylesheet" href="theme.css">

  <style>
    :root {
      --primary: #07e219;
      --bg-pure: #000000;
      --nav-bg: rgba(0, 0, 0, 0.8);
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.1);
      --card-hover-bg: rgba(255, 255, 255, 0.06);
      --border-soft: rgba(255, 255, 255, 0.08);
      --text-main: #ffffff;
      --text-muted: #999999;
      --dot-color: rgba(255, 255, 255, 0.05);
    }

    body.light-mode {
      --bg-pure: #ffffff;
      --nav-bg: rgba(255, 255, 255, 0.8);
      --card-bg: rgba(0, 0, 0, 0.02);
      --card-border: rgba(0, 0, 0, 0.06);
      --card-hover-bg: rgba(0, 0, 0, 0.04);
      --border-soft: rgba(0, 0, 0, 0.05);
      --text-main: #111111;
      --text-muted: #666666;
      --dot-color: rgba(0, 0, 0, 0.05);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    body {
      background: var(--bg-pure);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
      width: 100%;
    }

    .dot-overlay {
      position: fixed;
      inset: 0;
      background-image: radial-gradient(var(--dot-color) 1px, transparent 1px);
      background-size: 30px 30px;
      z-index: 0;
      pointer-events: none;
    }

    .content-wrapper {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-top: 40px;
      margin-bottom: 60px;
      animation: entrance-slide 1s cubic-bezier(0.2, 0, 0.3, 1);
    }

    .header h1 {
      font-size: 52px;
      font-weight: 950;
      letter-spacing: -3px;
      line-height: 1.05;
      margin-bottom: 25px;
      color: var(--text-main);
    }

    .header p {
      color: var(--text-muted);
      font-size: 18px;
      line-height: 1.6;
      max-width: 700px;
      margin: 0 auto;
    }

    .domains-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
      width: 100%;
      max-width: 1200px;
      padding: 20px;
    }

    .domain-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border-radius: 24px;
      padding: 40px;
      text-align: center;
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      animation: entrance-slide 1s ease-out backwards;
    }

    .domain-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.05), transparent 70%);
      opacity: 0;
      transition: opacity 0.5s;
    }

    .domain-card:hover {
      background: var(--card-hover-bg);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-10px);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
    }

    .domain-card:hover::before {
      opacity: 1;
    }

    .light-mode .domain-card:hover {
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.08);
      border-color: rgba(0, 0, 0, 0.1);
    }

    .icon-wrapper {
      width: 80px;
      height: 80px;
      background: rgba(7, 226, 25, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 25px;
      font-size: 2.2rem;
      color: var(--primary);
      transition: all 0.4s cubic-bezier(0.2, 0, 0, 1);
      border: 1px solid rgba(7, 226, 25, 0.2);
    }

    .domain-card:hover .icon-wrapper {
      background: var(--primary);
      color: black;
      transform: scale(1.1);
      box-shadow: 0 0 30px rgba(7, 226, 25, 0.3);
    }

    .domain-title {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
      color: var(--text-main);
    }

    .domain-desc {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.6;
      font-weight: 500;
    }

    /* Modal Styles */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal-content {
      background: var(--nav-bg);
      backdrop-filter: blur(30px) saturate(150%);
      border: 1px solid var(--border-soft);
      border-radius: 32px;
      padding: 40px;
      width: 95%;
      max-width: 900px;
      max-height: 85vh;
      overflow-y: auto;
      transform: scale(0.9) translateY(20px);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8), 0 0 1px 1px rgba(255, 255, 255, 0.05);
    }

    .modal-content::-webkit-scrollbar {
      width: 8px;
    }

    .modal-content::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
    }

    .modal-content::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 10px;
    }

    .modal-overlay.active .modal-content {
      transform: scale(1) translateY(0);
    }

    .close-modal {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.5rem;
      cursor: pointer;
      transition: color 0.2s;
    }

    .close-modal:hover {
      color: #ff4757;
    }

    .modal-header {
      margin-bottom: 30px;
      text-align: center;
    }

    .modal-header h2 {
      font-size: 2.2rem;
      color: var(--primary);
      margin-bottom: 5px;
      letter-spacing: -1px;
    }

    .modal-header p {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 25px;
    }

    .search-container {
      position: relative;
      margin-bottom: 30px;
    }

    .modal-search {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-soft);
      padding: 15px 20px 15px 50px;
      border-radius: 16px;
      color: var(--text-main);
      font-size: 1rem;
      transition: all 0.3s;
    }

    .modal-search:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 20px rgba(7, 226, 25, 0.1);
    }

    .search-icon {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    .subgroup-selection {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 10px;
    }

    .subgroup-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 30px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      text-align: center;
    }

    .subgroup-card:hover {
      background: rgba(7, 226, 25, 0.06);
      border-color: var(--primary);
      transform: translateY(-5px);
    }

    .subgroup-card i {
      font-size: 2.5rem;
      color: var(--primary);
      margin-bottom: 20px;
      display: block;
    }

    .subgroup-card h4 {
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: 10px;
      color: var(--text-main);
    }

    .subgroup-card p {
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .modal-back-btn {
      display: none;
      align-items: center;
      gap: 8px;
      background: none;
      border: none;
      color: var(--primary);
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 20px;
      font-size: 0.9rem;
      padding: 0;
    }

    .modal-back-btn:hover {
      text-decoration: underline;
    }

    .subdomains-grid {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .category-section h3 {
      font-size: 1.1rem;
      color: var(--text-muted);
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 800;
      border-bottom: 1px solid var(--border-soft);
      padding-bottom: 10px;
    }

    .subdomains-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
    }

    .subdomain-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 14px 20px;
      border-radius: 14px;
      color: var(--text-main);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .subdomain-btn span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .subdomain-btn i {
      font-size: 0.8rem;
      opacity: 0.5;
      transition: transform 0.3s;
    }

    .subdomain-btn:hover {
      background: rgba(7, 226, 25, 0.1);
      border-color: var(--primary);
      transform: translateY(-2px);
    }

    .subdomain-btn:hover i {
      transform: translateX(4px);
      opacity: 1;
    }

    @keyframes entrance-slide {
      from { opacity: 0; transform: translateY(40px); filter: blur(10px); }
      to { opacity: 1; transform: translateY(0); filter: blur(0); }
    }
    
    .back-btn {
      position: fixed;
      top: 30px;
      left: 30px;
      color: var(--text-muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      font-size: 14px;
      transition: all 0.3s;
      padding: 12px 24px;
      background: var(--card-bg);
      border: 1px solid var(--border-soft);
      border-radius: 100px;
      z-index: 1000;
      backdrop-filter: blur(10px);
    }
    
    .back-btn:hover {
      color: var(--primary);
      border-color: var(--primary);
      transform: translateX(-5px);
    }
  </style>
</head>

            'Agri Supply Chain Manager', 'Warehouse Manager', 'Procurement Officer', 
            'Cold Chain Manager', 'Logistics Coordinator', 'Import / Export Officer', 
            'Quality Assurance Manager'
          ],
          'Government & Extension Services': [
            'Agricultural Extension Officer', 'Agricultural Development Officer', 
            'KVK Scientist', 'NABARD Officer', 'Agricultural Inspector', 
            'District Agriculture Officer', 'Field Assistant'
          ],
          'AgriTech & Digital Agriculture': [
            'AgriTech Sales Specialist', 'Precision Agriculture Consultant', 
            'Drone Agriculture Specialist', 'Farm Software Specialist', 
            'AgriTech Business Analyst', 'Remote Sensing Analyst', 'IoT Specialist'
          ]
        }
      }
    ];

    const grid = document.getElementById('domainsGrid');
    const modal = document.getElementById('subdomainModal');
    const closeBtn = document.getElementById('closeModal');
    const modalTitle = document.getElementById('modalTitle');
    const subList = document.getElementById('subdomainsList');
    const modalSubtitle = document.getElementById('modalSubtitle');
    const modalBack = document.getElementById('modalBack');
    const modalSearch = document.getElementById('modalSearch');
    const searchContainer = document.getElementById('searchContainer');

    let currentDomain = null;
    let currentFilteredData = null;

    // Render Domain Cards
    function renderDomainCards() {
      grid.innerHTML = '';
      domainsData.forEach((d, index) => {
        const card = document.createElement('div');
        card.className = 'domain-card';
        card.style.animationDelay = `${index * 0.1}s`;
        card.innerHTML = `
          <div class="icon-wrapper">
            <i class="fa-solid ${d.icon}"></i>
          </div>
          <h3 class="domain-title">${d.title}</h3>
          <p class="domain-desc">${d.desc}</p>
        `;
        
        card.addEventListener('click', () => openModal(d));
        grid.appendChild(card);
      });
    }

    renderDomainCards();

    function openModal(domainObj) {
      currentDomain = domainObj;
      modalTitle.textContent = domainObj.title;
      modalSubtitle.textContent = "Choose your specific focus area for more precision.";
      modalBack.style.display = 'none';
      searchContainer.style.display = 'none';
      subList.innerHTML = '';
      modalSearch.value = '';

      // Check if it has subgroups (like Tech vs Core)
      if (domainObj.subgroups) {
        renderSubgroups(domainObj.subgroups);
      } else {
        searchContainer.style.display = 'block';
        currentFilteredData = domainObj.subdomains;
        renderSubdomains(domainObj.subdomains);
      }

      modal.classList.add('active');
    }

    function renderSubgroups(subgroups) {
      modalSubtitle.textContent = "Select your engineering path to see specialized roles.";
      searchContainer.style.display = 'none';
      subList.innerHTML = '<div class="subgroup-selection"></div>';
      const container = subList.querySelector('.subgroup-selection');

      Object.entries(subgroups).forEach(([name, data]) => {
        const div = document.createElement('div');
        div.className = 'subgroup-card';
        const icon = name.includes('Software') ? 'fa-code-branch' : 'fa-cog';
        div.innerHTML = `
          <i class="fas ${icon}"></i>
          <h4>${name}</h4>
          <p>Discover specialized roles in ${name.toLowerCase()}.</p>
        `;
        div.addEventListener('click', () => {
          modalBack.style.display = 'flex';
          searchContainer.style.display = 'block';
          modalSubtitle.textContent = `Specialized roles in ${name}`;
          currentFilteredData = data;
          renderSubdomains(data);
        });
        container.appendChild(div);
      });
    }

    function renderSubdomains(subdomains, filter = '') {
      subList.innerHTML = '';
      const filterLower = filter.toLowerCase();

      Object.entries(subdomains).forEach(([category, list]) => {
        const filteredList = list.filter(item => item.toLowerCase().includes(filterLower));
        
        if (filteredList.length > 0) {
          const section = document.createElement('div');
          section.className = 'category-section';
          section.innerHTML = `<h3>${category}</h3>`;
          
          const listDiv = document.createElement('div');
          listDiv.className = 'subdomains-list';
          
          filteredList.forEach((sub) => {
            const btn = document.createElement('button');
            btn.className = 'subdomain-btn';
            btn.innerHTML = `
              <span>${sub}</span>
              <i class="fas fa-chevron-right"></i>
            `;
            btn.addEventListener('click', () => selectPath(currentDomain.title, sub));
            listDiv.appendChild(btn);
          });
          
          section.appendChild(listDiv);
          subList.appendChild(section);
        }
      });

      if (subList.innerHTML === '') {
        subList.innerHTML = `<div style="text-align:center; padding: 40px; color: var(--text-muted);">No roles found matching "${filter}"</div>`;
      }
    }

    // Search functionality
    modalSearch.addEventListener('input', (e) => {
      renderSubdomains(currentFilteredData, e.target.value);
    });

    // Back to subgroups
    modalBack.addEventListener('click', () => {
      openModal(currentDomain);
    });

    function closeModal() {
      modal.classList.remove('active');
    }

    closeBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => {
      if(e.target === modal) closeModal();
    });

    // The core redirection function
    function selectPath(domain, sub) {
      const expertise = encodeURIComponent(`${domain} - ${sub}`);
      
      // Save the clean subdomain key for the builder to use
      const subKey = sub.toLowerCase().replace(/[^a-z0-9]/g, '-');
      localStorage.setItem('selectedSubdomain', subKey);
      
      console.log(`Selected Subdomain: ${subKey}`);
      
      // Redirect to builder and pass the domain as a query parameter
      window.location.href = `/resume-builder.html?domain=${expertise}`;
    }
  </script>
</body>
</html>
