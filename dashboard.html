<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hiero - Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    .action-btn { cursor: pointer; }
  </style>
</head>
<body>
  <div class="screen">
    <div class="card">
      <div style="background: #00ff00; color: black; font-weight: 900; width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">H</div>
      <h2>Hiero Dashboard</h2>
      <button id="create-resume-btn" class="action-btn" style="background: #00ff00; color: black; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; width: 100%; margin-bottom: 15px;">Create Resume</button>
      <button id="analyze-resume-btn" class="action-btn" style="background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 15px 30px; border-radius: 50px; width: 100%;">Analyze Resume</button>
    </div>
  </div>

  <!-- Referral Modal -->
  <div id="referralModal" style="display:none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; font-family: 'Poppins', sans-serif;">
    <div style="background: #111; color: white; padding: 40px; border-radius: 24px; max-width: 400px; width: 90%; text-align: center; border: 1px solid #00ff00; box-shadow: 0 0 30px rgba(0,255,0,0.2);">
      <h3 style="margin-top: 0; font-size: 24px;">Invitation Check</h3>
      <p style="color: #888;">Do you have a referral code for bonus perks?</p>
      <input type="text" id="referralCodeInput" placeholder="HIERO-XXXX" style="width: 100%; padding: 15px; margin: 20px 0; border: 2px dashed #333; border-radius: 12px; text-align: center; font-weight: bold; text-transform: uppercase; background: #222; color: #00ff00;">
      <button id="verifyRefBtn" style="width: 100%; background: #00ff00; color: black; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-bottom: 15px;">Verify & Continue</button>
      <button id="skipRefBtn" style="background: transparent; color: #555; border: none; cursor: pointer; font-size: 14px;">I don't have a code, proceed directly</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
