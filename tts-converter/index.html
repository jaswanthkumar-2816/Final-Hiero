<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>TTS Converter — Hiero Standalone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --c1: rgba(15, 15, 15, .85);
      --green: #06e506;
      --cyan: #00d4ff;
      --t1: #e8f4ff;
      --t2: #8ba5c5;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--t1);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    .container {
      max-width: 800px;
      width: 100%;
      background: var(--c1);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 24px;
      padding: 40px;
    }
    textarea {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 16px;
      color: #fff;
      min-height: 200px;
    }
    .btn-play {
      width: 100%;
      background: var(--cyan);
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 20px;
    }
    .controls-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }
    select {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      padding: 10px;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔊 TTS Converter</h1>
    <textarea id="ttsText" placeholder="Enter text here..."></textarea>
    <div class="controls-grid">
      <select id="voiceSelect"></select>
      <input type="range" id="rateRange" min="0.5" max="2" step="0.1" value="1" />
    </div>
    <button id="playBtn" class="btn-play">Preview Voiceover</button>
    <a href="/reel-creator/" style="display: block; margin-top: 20px; color: var(--t2); text-decoration: none; font-size: 14px; text-align: center;">← Back to Reel Creator</a>
  </div>
  <script>
    const synth = window.speechSynthesis;
    const playBtn = document.getElementById('playBtn');
    const ttsText = document.getElementById('ttsText');
    const voiceSelect = document.getElementById('voiceSelect');
    const rateRange = document.getElementById('rateRange');

    function populateVoices() {
      const voices = synth.getVoices();
      voiceSelect.innerHTML = voices.map((v, i) => `<option value="${i}">${v.name}</option>`).join('');
    }
    if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = populateVoices;
    populateVoices();

    window.onload = () => {
      const saved = localStorage.getItem('tts_input');
      if (saved) { ttsText.value = saved; localStorage.removeItem('tts_input'); }
    };

    playBtn.addEventListener('click', () => {
      if (synth.speaking) { synth.cancel(); return; }
      const utter = new SpeechSynthesisUtterance(ttsText.value);
      utter.voice = synth.getVoices()[voiceSelect.value];
      utter.rate = rateRange.value;
      synth.speak(utter);
    });
  </script>
</body>
</html>
