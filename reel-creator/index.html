<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Reel Creator — Hiero Standalone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #000000;
      --c1: rgba(15, 15, 15, .85);
      --c2: rgba(22, 22, 22, .95);
      --green: #06e506;
      --t1: #e8f4ff;
      --t2: #8ba5c5;
      --t3: #4a6280;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--t1);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      background-image: 
        radial-gradient(ellipse at 0% 0%, rgba(0, 230, 118, .1) 0%, transparent 40%),
        radial-gradient(ellipse at 100% 10%, rgba(0, 230, 118, .05) 0%, transparent 45%);
    }

    .container {
      max-width: 800px;
      width: 100%;
      background: var(--c1);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 32px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #fff 0%, var(--green) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: var(--t2);
      margin-bottom: 32px;
      font-size: 16px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      color: var(--t2);
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    input, textarea {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px 16px;
      color: #fff;
      font-family: inherit;
      font-size: 15px;
    }

    .btn-generate {
      width: 100%;
      background: var(--green);
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-generate:hover { transform: scale(1.02); }

    .result-area { margin-top: 40px; display: none; }

    .result-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 24px;
      position: relative;
    }

    .result-content { font-size: 15px; line-height: 1.6; white-space: pre-wrap; }

    .copy-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--t2);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
    }

    .loader {
      display: none;
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top: 3px solid var(--green);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 Reel Creator</h1>
    <p class="subtitle">Generate viral scripts and captions using Groq AI.</p>
    <div class="form-group">
      <label>Topic</label>
      <textarea id="topic" rows="3" placeholder="What's the reel about?"></textarea>
    </div>
    <div class="form-group">
      <label>Target Audience</label>
      <input type="text" id="audience" placeholder="e.g. Job seekers" />
    </div>
    <button id="generateBtn" class="btn-generate">Generate Script</button>
    <div id="loader" class="loader"></div>
    <div id="resultArea" class="result-area">
      <div class="result-card">
        <div style="display: flex; gap: 10px; position: absolute; top: 16px; right: 16px;">
          <button id="ttsBtn" class="copy-btn" style="position: static;">Send to TTS</button>
          <button id="copyBtn" class="copy-btn" style="position: static;">Copy</button>
        </div>
        <div id="resultContent" class="result-content"></div>
      </div>
    </div>
  </div>
  <script>
    const generateBtn = document.getElementById('generateBtn');
    const topicInput = document.getElementById('topic');
    const audienceInput = document.getElementById('audience');
    const loader = document.getElementById('loader');
    const resultArea = document.getElementById('resultArea');
    const resultContent = document.getElementById('resultContent');
    const ttsBtn = document.getElementById('ttsBtn');

    generateBtn.addEventListener('click', async () => {
      generateBtn.disabled = true;
      loader.style.display = 'block';
      resultArea.style.display = 'none';
      try {
        const res = await fetch('/api/reel/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ topic: topicInput.value, audience: audienceInput.value })
        });
        const data = await res.json();
        if (data.success) {
          resultContent.innerHTML = marked.parse(data.content);
          resultArea.style.display = 'block';
        }
      } catch (e) { alert('Error!'); }
      finally { generateBtn.disabled = false; loader.style.display = 'none'; }
    });

    ttsBtn.addEventListener('click', () => {
      localStorage.setItem('tts_input', resultContent.innerText);
      window.location.href = '/tts-converter/';
    });
  </script>
</body>
</html>
