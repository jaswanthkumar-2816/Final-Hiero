<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hiero — Data vs Output Verifier</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>
  <style>
    :root {
      --bg: #080b0f;
      --surface: #111418;
      --surface2: #161b24;
      --surface3: #1d2430;
      --border: #232a35;
      --green: #2ae023;
      --green-dim: rgba(42, 224, 35, 0.12);
      --red: #ef4444;
      --red-dim: rgba(239, 68, 68, 0.1);
      --yellow: #f59e0b;
      --blue: #3b82f6;
      --text: #f1f5f9;
      --muted: #64748b;
      --muted2: #94a3b8;
      --font: 'Inter', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
    }

    /* ── TOP BAR ── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 200;
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-badge {
      background: var(--green-dim);
      border: 1px solid rgba(42, 224, 35, 0.3);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 800;
      color: var(--green);
      letter-spacing: 1px;
    }

    .topbar h1 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }

    .topbar h1 small {
      color: var(--muted);
      font-weight: 400;
      font-size: 12px;
      margin-left: 8px;
    }

    .topbar-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #progressBar {
      height: 3px;
      background: linear-gradient(90deg, var(--green), #06a529);
      width: 0%;
      transition: width 0.4s ease;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 999;
      border-radius: 0 2px 2px 0;
    }

    /* ── SUMMARY ROW ── */
    .summary-row {
      display: flex;
      gap: 12px;
      padding: 12px 28px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      align-items: center;
      flex-wrap: wrap;
    }

    .pill {
      padding: 5px 14px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .pill-total {
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .pill-pass {
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid rgba(42, 224, 35, 0.25);
    }

    .pill-fail {
      background: var(--red-dim);
      color: var(--red);
      border: 1px solid rgba(239, 68, 68, 0.25);
    }

    .pill-run {
      background: rgba(59, 130, 246, 0.12);
      color: var(--blue);
      border: 1px solid rgba(59, 130, 246, 0.25);
    }

    /* ── TEMPLATE BLOCKS ── */
    .templates-wrap {
      padding: 20px 28px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .tmpl-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: border-color 0.3s;
    }

    .tmpl-block.pass {
      border-color: rgba(42, 224, 35, 0.3);
    }

    .tmpl-block.fail {
      border-color: rgba(239, 68, 68, 0.3);
    }

    .tmpl-block.loading {
      border-color: rgba(245, 158, 11, 0.3);
    }

    /* Block header */
    .block-header {
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }

    .block-header:hover {
      background: var(--surface3);
    }

    .block-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .block-num {
      width: 24px;
      height: 24px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
    }

    .block-name {
      font-size: 13px;
      font-weight: 700;
    }

    .block-id {
      font-size: 10px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.04);
      padding: 2px 8px;
      border-radius: 4px;
      font-family: var(--mono);
    }

    .block-status {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-badge {
      padding: 4px 12px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .badge-pass {
      background: var(--green-dim);
      color: var(--green);
    }

    .badge-fail {
      background: var(--red-dim);
      color: var(--red);
    }

    .badge-loading {
      background: rgba(245, 158, 11, 0.1);
      color: var(--yellow);
    }

    .badge-pending {
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
    }

    .badge-meta {
      font-size: 11px;
      color: var(--muted);
    }

    /* Collapse toggle */
    .block-toggle {
      color: var(--muted);
      font-size: 12px;
      transition: transform 0.2s;
    }

    .block-toggle.open {
      transform: rotate(180deg);
    }

    /* Block body — 3 columns */
    .block-body {
      display: grid;
      grid-template-columns: 300px 1fr 1fr;
      min-height: 520px;
    }

    .block-body.collapsed {
      display: none;
    }

    /* Left: data panel */
    .data-panel {
      border-right: 1px solid var(--border);
      overflow-y: auto;
      background: var(--surface2);
      max-height: 600px;
    }

    .data-panel-header {
      padding: 10px 16px;
      background: var(--surface3);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 6px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    /* Data fields */
    .data-section {
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
    }

    .data-section:last-child {
      border-bottom: none;
    }

    .data-section-title {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .data-section-title .section-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
    }

    .field-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 11px;
    }

    .field-key {
      color: var(--blue);
      font-family: var(--mono);
      font-size: 10px;
      min-width: 90px;
      flex-shrink: 0;
      padding-top: 1px;
    }

    .field-val {
      color: var(--text);
      font-family: var(--mono);
      font-size: 10px;
      word-break: break-all;
      line-height: 1.5;
    }

    .field-val.empty {
      color: var(--muted);
      font-style: italic;
    }

    .field-val.arr-val {
      color: #a78bfa;
    }

    .field-val.str-val {
      color: #34d399;
    }

    .field-val.num-val {
      color: #fb923c;
    }

    /* Experience / education items */
    .data-item {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 6px;
      font-size: 10px;
      font-family: var(--mono);
    }

    .data-item-title {
      color: var(--text);
      font-weight: 700;
      margin-bottom: 4px;
      font-size: 10.5px;
    }

    .data-item-sub {
      color: var(--muted);
      margin-bottom: 2px;
    }

    .data-item-desc {
      color: var(--muted2);
      margin-top: 4px;
      line-height: 1.5;
    }

    /* Tag chips */
    .tag-chip {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-family: var(--mono);
      background: rgba(59, 130, 246, 0.12);
      color: var(--blue);
      margin: 2px 2px 2px 0;
    }

    /* Right: PDF preview panel */
    .pdf-panel {
      background: #e5e7eb;
      display: flex;
      flex-direction: column;
    }

    .pdf-panel-header {
      padding: 10px 16px;
      background: var(--surface3);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .pdf-panel-header .pdf-actions {
      display: flex;
      gap: 8px;
    }

    .pdf-action-btn {
      padding: 4px 10px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all 0.2s;
    }

    .pdf-action-btn:hover {
      border-color: var(--green);
      color: var(--green);
    }

    .pdf-preview {
      flex: 1;
      min-height: 500px;
      background: #fff;
    }

    .pdf-preview iframe {
      width: 100%;
      height: 100%;
      border: none;
      min-height: 500px;
    }

    .pdf-placeholder {
      width: 100%;
      height: 100%;
      min-height: 500px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--surface2);
    }

    .placeholder-icon {
      font-size: 48px;
      color: var(--muted);
    }

    .placeholder-label {
      font-size: 13px;
      color: var(--muted);
    }

    /* Right: DOCX preview panel */
    .docx-panel {
      background: #e5e7eb;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
    }

    .docx-panel-header {
      padding: 10px 16px;
      background: var(--surface3);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .docx-panel-header .docx-actions {
      display: flex;
      gap: 8px;
    }

    .docx-preview {
      flex: 1;
      min-height: 500px;
      background: #fff;
      overflow-y: auto;
      padding: 0;
    }

    .docx-preview iframe {
      width: 100%;
      height: 100%;
      border: none;
      min-height: 500px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(42, 224, 35, 0.15);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Error panel */
    .error-panel {
      padding: 20px;
      background: var(--red-dim);
      border-top: 1px solid rgba(239, 68, 68, 0.2);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--red);
      line-height: 1.6;
    }

    /* Buttons */
    .btn {
      padding: 9px 20px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      border: none;
    }

    .btn-green {
      background: var(--green);
      color: #000;
    }

    .btn-green:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }

    .btn-green:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-outline {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-outline:hover {
      border-color: var(--green);
      color: var(--green);
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--muted);
    }

    @media (max-width: 900px) {
      .block-body {
        grid-template-columns: 1fr;
      }

      .data-panel {
        border-right: none;
        border-bottom: 1px solid var(--border);
        max-height: 300px;
      }
    }
  </style>
</head>

    // Helper: render PDF blob into target preview element (iframe + download)
    async function showPdfPreview(previewEl, blob, filename = 'resume.pdf') {
      // clean previous
      if (previewEl._blobUrls) previewEl._blobUrls.forEach(u => URL.revokeObjectURL(u));
      previewEl._blobUrls = previewEl._blobUrls || [];
      const url = URL.createObjectURL(blob);
      previewEl._blobUrls.push(url);
      previewEl.innerHTML = `
		<div style="height:100%; display:flex; flex-direction:column; gap:8px;">
			<div style="flex:1; border-radius:6px; overflow:hidden; background:#fff;">
				<iframe src="${url}" title="PDF Preview" style="width:100%; height:100%; border:none;"></iframe>
			</div>
			<div style="padding:8px; display:flex; gap:8px; align-items:center;">
				<a href="${url}" download="${filename}" style="font-size:13px; color:var(--muted);">Download PDF</a>
			</div>
		</div>`;
    }

    // Helper: render DOCX blob into target preview element using mammoth.js; fallback to download link
    async function showDocxPreview(previewEl, blob, filename = 'resume.docx') {
      // clean previous
      if (previewEl._blobUrls) previewEl._blobUrls.forEach(u => URL.revokeObjectURL(u));
      previewEl._blobUrls = previewEl._blobUrls || [];
      try {
        const arrayBuffer = await blob.arrayBuffer();
        const result = await window.mammoth.convertToHtml({ arrayBuffer });
        const html = result.value;
        const docxUrl = URL.createObjectURL(blob);
        previewEl._blobUrls.push(docxUrl);
        previewEl.innerHTML = `
			<div style="padding:16px; background:#fff; color:#111; overflow:auto; max-height:100%;">
				${html}
			</div>
			<div style="padding:8px;">
				<a href="${docxUrl}" download="${filename}" style="font-size:13px; color:var(--muted);">Download DOCX</a>
			</div>`;
      } catch (err) {
        // fallback: provide download link and a message
        const fallbackUrl = URL.createObjectURL(blob);
        previewEl._blobUrls.push(fallbackUrl);
        previewEl.innerHTML = `
			<div class="pdf-placeholder">
				<div class="placeholder-label">Cannot preview DOCX in browser. <a href="${fallbackUrl}" download="${filename}">Download</a></div>
			</div>`;
      }
    }

    // Utility: safe fetch wrapper with JSON error handling
    async function fetchResumeBlob(url, payload) {
      const resp = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!resp.ok) {
        const txt = await resp.text().catch(() => '');
        throw new Error(`Server returned ${resp.status}: ${txt}`);
      }
      const ct = resp.headers.get('content-type') || '';
      const blob = await resp.blob();
      return { ct, blob };
    }

        },
        {
          name: 'Tourism Management System',
          tech: 'HTML, CSS, JavaScript, PHP, MySQL',
          description: '• Developed a tourism management website for tour bookings.\n• Designed responsive frontend pages and admin features.\n• Connected PHP with MySQL for data management.',
          link: 'https://sanchari.infinityfreeapp.com/?i=1'
        },
        {
          name: 'Interior Portfolio Website',
          tech: 'React, Tailwind CSS, Node.js, MongoDB',
          description: '• Developed a portfolio website for interior design projects.\n• Integrated database to manage project details dynamically.\n• Fixed backend and database issues for smooth performance.',
          link: 'https://github.com/YARAJARLAGANESH/Interior-Website'
        }
      ],
      hobbies: '',
      additionalInfo: 'Declaration: The information provided above is true and correct to the best of my knowledge.'
    };

    // ── State ─────────────────────────────────────────────────────────────────────
    let passCount = 0, failCount = 0, pendingCount = 22;
    const blobUrls = {};

    // ── Build all blocks on page load ─────────────────────────────────────────────
    function buildAll() {
      const wrap = document.getElementById('templatesWrap');
      wrap.innerHTML = '';
      TEMPLATES.forEach((tmpl, idx) => {
        wrap.appendChild(buildBlock(tmpl, idx + 1));
      });

      // Populate all JSON editors with current INPUT_DATA
      TEMPLATES.forEach(tmpl => {
        const el = document.getElementById(`json-${tmpl.id}`);
        if (el) {
          el.value = JSON.stringify(INPUT_DATA, null, 2);
        }
      });
    }

    function buildBlock(tmpl, num) {
      const div = document.createElement('div');
      div.className = 'tmpl-block';
      div.id = `block-${tmpl.id}`;

      div.innerHTML = `
    <div class="block-header" onclick="toggleBlock('${tmpl.id}')">
      <div class="block-title">
        <div class="block-num">${num}</div>
        <div class="block-name">${tmpl.name}</div>
        <div class="block-id">${tmpl.id}</div>
        <span style="font-size:10px;color:var(--muted);background:rgba(255,255,255,0.03);padding:2px 8px;border-radius:4px">${tmpl.group}</span>
      </div>
      <div class="block-status">
        <div class="status-badge badge-pending" id="badge-${tmpl.id}">
          <i class="fas fa-clock"></i> Pending
        </div>
        <button class="btn btn-outline" style="padding:5px 12px;font-size:11px;" onclick="event.stopPropagation();retestOne('${tmpl.id}','${tmpl.name}')">
          <i class="fas fa-redo"></i> Test
        </button>
        <i class="fas fa-chevron-down block-toggle open" id="toggle-${tmpl.id}"></i>
      </div>
    </div>

    <div class="block-body" id="body-${tmpl.id}">

      <!-- LEFT: INPUT DATA (Fully Editable Live JSON Editor!) -->
      <div class="data-panel" style="display:flex; flex-direction:column; padding:0; background:var(--surface);">
        <div class="data-panel-header" style="display:flex; justify-content:space-between; align-items:center; background:var(--surface2); padding:10px 16px; border-bottom:1px solid var(--border);">
          <span><i class="fas fa-edit" style="color:var(--blue)"></i>&nbsp; EDIT TEST DATA (JSON)</span>
          <button class="btn btn-outline" style="padding:4px 8px; font-size:10px; color:var(--green); border-color:rgba(42,224,35,0.4);" onclick="event.stopPropagation(); syncJsonToAll('${tmpl.id}')">
            <i class="fas fa-sync"></i> Sync to All
          </button>
        </div>
        <textarea id="json-${tmpl.id}" style="width:100%; flex:1; min-height:480px; background:#0c0f13; color:#f1f5f9; border:none; padding:15px; font-family:var(--mono); font-size:11px; line-height:1.6; resize:vertical; outline:none; scrollbar-width:thin; scrollbar-color:#232a35 #0c0f13;"></textarea>
      </div>

      <!-- MIDDLE: PDF OUTPUT -->
      <div class="pdf-panel">
        <div class="pdf-panel-header">
          <span><i class="fas fa-file-pdf" style="color:var(--red)"></i>&nbsp; GENERATED PDF OUTPUT</span>
          <div class="pdf-actions" id="pdfActions-${tmpl.id}"></div>
        </div>
        <div class="pdf-preview" id="pdfPreview-${tmpl.id}">
          <div class="pdf-placeholder">
            <div class="placeholder-icon"><i class="fas fa-file-pdf"></i></div>
            <div class="placeholder-label">Click "Test" or "Test All 22" to generate</div>
          </div>
        </div>
      </div>

      <!-- RIGHT: MATCHED OUTPUT (same render source as PDF) -->
      <div class="docx-panel">
        <div class="docx-panel-header">
          <span><i class="fas fa-clone" style="color:var(--blue)"></i>&nbsp; MATCHED TEMPLATE PREVIEW (SAME AS PDF)</span>
          <div class="docx-actions" id="docxActions-${tmpl.id}"></div>
        </div>
        <div class="docx-preview" id="docxPreview-${tmpl.id}">
          <div class="pdf-placeholder">
            <div class="placeholder-icon"><i class="fas fa-clone"></i></div>
            <div class="placeholder-label">Click "Test" or "Test All 22" to generate</div>
          </div>
        </div>
      </div>

    </div>
  `;
      return div;
    }

    function buildDataPanel() {
      const d = INPUT_DATA;
      const pi = d.personalInfo;

      return `
    <!-- Personal Info -->
    <div class="data-section">
      <div class="data-section-title"><span class="section-dot"></span> Personal Info</div>
      ${fieldRow('fullName', pi.fullName)}
      ${fieldRow('email', pi.email)}
      ${fieldRow('phone', pi.phone)}
      ${fieldRow('address', pi.address)}
      ${fieldRow('roleTitle', pi.roleTitle, 'KEY FIELD — shows as subtitle')}
      ${fieldRow('linkedin', pi.linkedin)}
      ${fieldRow('github', pi.github)}
      ${fieldRow('website', pi.website)}
    </div>

    <!-- Summary -->
    <div class="data-section">
      <div class="data-section-title"><span class="section-dot"></span> Summary / About Me</div>
      <div class="field-val str-val" style="font-family:var(--mono);font-size:10px;line-height:1.6">${d.summary}</div>
    </div>

    <!-- Experience -->
    <div class="data-section">
      <div class="data-section-title"><span class="section-dot"></span> Experience (${d.experience.length} items)</div>
      ${d.experience.map(e => `
        <div class="data-item">
          <div class="data-item-title">📋 ${e.jobTitle} @ ${e.company}</div>
          <div class="data-item-sub">${e.startDate} → ${e.endDate}</div>
          <div class="data-item-desc">${e.description.replace(/\n/g, '<br>')}</div>
        </div>
      `).join('')}
    </div>

    <!-- Education -->
    <div class="data-section">
      <div class="data-section-title"><span class="section-dot"></span> Education</div>
      ${d.education.map(e => `
        <div class="data-item">
          <div class="data-item-title">🎓 ${e.degree}</div>
          <div class="data-item-sub">${e.school} · ${e.gradYear}</div>
          ${e.gpa ? `<div class="data-item-sub">GPA: ${e.gpa}</div>` : ''}
        </div>
      `).join('')}
    </div>

    <!-- Skills -->
    <div class="data-section">
      <div class="data-section-title"><span class="section-dot"></span> Technical Skills (as string → converted to array)</div>
      <div>${d.technicalSkills.split(',').map(s => `<span class="tag-chip">${s.trim()}</span>`).join('')}</div>
    </div>

    <!-- Soft Skills -->
    <div class="data-section">
      <div class="data-section-title"><span class="section-dot"></span> Soft Skills</div>
      <div>${d.softSkills.split(',').map(s => `<span class="tag-chip" style="background:rgba(167,139,250,0.12);color:#a78bfa">${s.trim()}</span>`).join('')}</div>
    </div>

    <!-- Languages -->
    <div class="data-section">
      <div class="data-section-title"><span class="section-dot"></span> Languages</div>
      <div>${d.languages.split(',').map(s => `<span class="tag-chip" style="background:rgba(251,146,60,0.12);color:#fb923c">${s.trim()}</span>`).join('')}</div>
    </div>

    <!-- Certifications -->
    <div class="data-section">
      <div class="data-section-title"><span class="section-dot"></span> Certifications (as string → converted to array)</div>
      ${d.certifications.split(',').map(c => `
        <div class="field-row">
          <span style="color:var(--green);font-size:10px">✓</span>
          <span class="field-val" style="font-family:var(--mono);font-size:10px">${c.trim()}</span>
        </div>
      `).join('')}
    </div>

    <!-- Achievements -->
    <div class="data-section">
      <div class="data-section-title"><span class="section-dot"></span> Achievements</div>
      ${d.achievements.split('\n').map(a => `
        <div class="field-row">
          <span style="color:var(--yellow);font-size:10px">★</span>
          <span class="field-val" style="font-family:var(--mono);font-size:10px">${a.trim()}</span>
        </div>
      `).join('')}
    </div>

    <!-- Projects -->
    <div class="data-section">
      <div class="data-section-title"><span class="section-dot"></span> Projects (${d.projects.length} items)</div>
      ${d.projects.map(p => `
        <div class="data-item">
          <div class="data-item-title">🚀 ${p.name}</div>
          <div class="data-item-sub">${p.tech}</div>
          <div class="data-item-desc">${p.description}</div>
          ${p.link ? `<div class="data-item-sub" style="color:var(--blue);margin-top:3px">🔗 ${p.link}</div>` : ''}
        </div>
      `).join('')}
    </div>

    <!-- Hobbies -->
    <div class="data-section">
      <div class="data-section-title"><span class="section-dot"></span> Hobbies</div>
      <div class="field-val str-val" style="font-size:10px;font-family:var(--mono)">${d.hobbies}</div>
    </div>
  `;
    }

    function fieldRow(key, val, hint = '') {
      const hasVal = val && val.trim && val.trim().length > 0;
      return `
    <div class="field-row">
      <span class="field-key">${key}:</span>
      <span class="field-val ${hasVal ? 'str-val' : 'empty'}" title="${hint || ''}">${hasVal ? val : '(empty)'}</span>
    </div>`;
    }

    // ── Toggle collapse ───────────────────────────────────────────────────────────
    function toggleBlock(id) {
      const body = document.getElementById(`body-${id}`);
      const icon = document.getElementById(`toggle-${id}`);
      body.classList.toggle('collapsed');
      icon.classList.toggle('open');
    }

    function expandAll() {
      TEMPLATES.forEach(t => {
        document.getElementById(`body-${t.id}`).classList.remove('collapsed');
        document.getElementById(`toggle-${t.id}`).classList.add('open');
      });
    }

    function collapseAll() {
      TEMPLATES.forEach(t => {
        document.getElementById(`body-${t.id}`).classList.add('collapsed');
        document.getElementById(`toggle-${t.id}`).classList.remove('open');
      });
    }

    // ── Test a single template ────────────────────────────────────────────────────
    async function retestOne(id, name) {
      await testOne(id, name, false);
    }

    async function testOne(id, name, batch = true) {
      const block = document.getElementById(`block-${id}`);
      const badge = document.getElementById(`badge-${id}`);
      const preview = document.getElementById(`pdfPreview-${id}`);
      const actions = document.getElementById(`pdfActions-${id}`);
      const docxPreview = document.getElementById(`docxPreview-${id}`);
      const docxActions = document.getElementById(`docxActions-${id}`);

      block.className = 'tmpl-block loading';
      badge.className = 'status-badge badge-loading';
      badge.innerHTML = `<div class="spinner" style="width:10px;height:10px;border-width:2px"></div> Testing...`;

      // Show spinner in preview
      preview.innerHTML = `
    <div class="pdf-placeholder">
      <div class="spinner"></div>
      <div class="placeholder-label" style="color:var(--yellow)">Generating PDF for "${name}"...</div>
    </div>`;

      docxPreview.innerHTML = `
    <div class="pdf-placeholder">
      <div class="spinner"></div>
      <div class="placeholder-label" style="color:var(--yellow)">Generating DOCX for "${name}"...</div>
    </div>`;

      // Expand block to show progress
      document.getElementById(`body-${id}`).classList.remove('collapsed');
      document.getElementById(`toggle-${id}`).classList.add('open');

      let data;
      try {
        const jsonStr = document.getElementById(`json-${id}`).value;
        data = JSON.parse(jsonStr);
        data.template = id;
        INPUT_DATA = data; // update global
      } catch (err) {
        block.className = 'tmpl-block fail';
        badge.className = 'status-badge badge-fail';
        badge.innerHTML = `<i class="fas fa-times-circle"></i> JSON ERROR`;

        preview.innerHTML = `
      <div class="pdf-placeholder" style="background:rgba(239,68,68,0.04)">
        <div class="placeholder-icon" style="color:var(--red);font-size:36px"><i class="fas fa-exclamation-triangle"></i></div>
        <div class="placeholder-label" style="color:var(--red);text-align:center;max-width:320px;line-height:1.6;font-size:12px">
          <strong>JSON Parse Error:</strong><br>${err.message}
        </div>
      </div>`;

        docxPreview.innerHTML = `
      <div class="pdf-placeholder" style="background:rgba(239,68,68,0.04)">
        <div class="placeholder-icon" style="color:var(--red);font-size:36px"><i class="fas fa-exclamation-triangle"></i></div>
        <div class="placeholder-label" style="color:var(--red);text-align:center;max-width:320px;line-height:1.6;font-size:12px">
          <strong>JSON Parse Error:</strong><br>${err.message}
        </div>
      </div>`;

        if (!batch) { failCount++; updateCounters(); }
        return 'fail';
      }

      const start = Date.now();

      try {
        const resp = await fetch(`${BACKEND_URL}/download-resume`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const elapsed = Date.now() - start;

        if (!resp.ok) {
          const txt = await resp.text().catch(() => resp.statusText);
          throw new Error(`HTTP ${resp.status} — ${txt.slice(0, 200)}`);
        }

        const ct = resp.headers.get('content-type') || '';
        if (!ct.includes('pdf')) {
          const txt = await resp.text();
          throw new Error(`Server returned non-PDF: ${txt.slice(0, 150)}`);
        }

        const blob = await resp.blob();
        if (blob.size < 300) throw new Error(`PDF too small (${blob.size} bytes) — server likely returned an error body`);

        // Revoke old blob URL if exists
        if (blobUrls[id]) URL.revokeObjectURL(blobUrls[id]);
        blobUrls[id] = URL.createObjectURL(blob);
        
        // ✅ SUCCESS
        block.className = 'tmpl-block pass';
        badge.className = 'status-badge badge-pass';
        badge.innerHTML = `<i class="fas fa-check-circle"></i> PASS &nbsp;<small style="font-weight:400;opacity:0.7">${Math.round(blob.size / 1024)}KB · ${elapsed}ms</small>`;

        preview.innerHTML = `<iframe src="${blobUrls[id]}" title="${name} PDF"></iframe>`;
        docxPreview.innerHTML = `<iframe src="${blobUrls[id]}" title="${name} Matched Preview"></iframe>`;

        actions.innerHTML = `
      <a class="pdf-action-btn" href="${blobUrls[id]}" download="${id}_resume.pdf">
        <i class="fas fa-download"></i> Download PDF
      </a>
      <a class="pdf-action-btn" href="${blobUrls[id]}" target="_blank">
        <i class="fas fa-external-link-alt"></i> Full screen
      </a>`;

        docxActions.innerHTML = `
      <span class="badge-meta"><i class="fas fa-check"></i> Same render source as PDF</span>`;

        if (!batch) { passCount++; updateCounters(); }
        return 'pass';

      } catch (err) {
        const elapsed = Date.now() - start;
        block.className = 'tmpl-block fail';
        badge.className = 'status-badge badge-fail';
        badge.innerHTML = `<i class="fas fa-times-circle"></i> FAIL`;

        preview.innerHTML = `
      <div class="pdf-placeholder" style="background:rgba(239,68,68,0.04)">
        <div class="placeholder-icon" style="color:var(--red);font-size:36px"><i class="fas fa-exclamation-triangle"></i></div>
        <div class="placeholder-label" style="color:var(--red);text-align:center;max-width:320px;line-height:1.6;font-size:12px">
          <strong>Error after ${elapsed}ms:</strong><br>${err.message}
        </div>
        <button class="btn btn-outline" style="margin-top:12px;font-size:12px" onclick="retestOne('${id}','${name}')">
          <i class="fas fa-redo"></i> Retry
        </button>
      </div>`;

        docxPreview.innerHTML = `
      <div class="pdf-placeholder" style="background:rgba(239,68,68,0.04)">
        <div class="placeholder-icon" style="color:var(--red);font-size:36px"><i class="fas fa-exclamation-triangle"></i></div>
        <div class="placeholder-label" style="color:var(--red);text-align:center;max-width:320px;line-height:1.6;font-size:12px">
          <strong>Error generating preview</strong>
        </div>
      </div>`;

        if (!batch) { failCount++; updateCounters(); }
        return 'fail';
      }
    }

    // ── Run all ───────────────────────────────────────────────────────────────────
    async function runAll() {
      const btn = document.getElementById('runBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Testing all...';

      passCount = 0; failCount = 0; pendingCount = 22;
      updateCounters();

      for (let i = 0; i < TEMPLATES.length; i++) {
        const t = TEMPLATES[i];
        const result = await testOne(t.id, t.name, true);
        if (result === 'pass') passCount++;
        else failCount++;
        pendingCount = 22 - passCount - failCount;
        updateCounters();
        document.getElementById('progressBar').style.width = `${Math.round((passCount + failCount) / 22 * 100)}%`;
        await new Promise(r => setTimeout(r, 100));
      }

      document.getElementById('progressBar').style.width = '100%';
      btn.disabled = false;
      btn.innerHTML = failCount === 0
        ? '<i class="fas fa-check-circle"></i> All 22 Passed! Run Again'
        : `<i class="fas fa-redo"></i> Run Again (${failCount} failed)`;
    }

    function updateCounters() {
      document.getElementById('cPass').textContent = passCount;
      document.getElementById('cFail').textContent = failCount;
      document.getElementById('cPend').textContent = pendingCount;
    }

    function syncJsonToAll(currentId) {
      const textarea = document.getElementById(`json-${currentId}`);
      if (!textarea) return;

      try {
        const val = JSON.parse(textarea.value);
        INPUT_DATA = val; // update global

        // Copy to all other textareas
        TEMPLATES.forEach(tmpl => {
          const otherTextarea = document.getElementById(`json-${tmpl.id}`);
          if (otherTextarea && tmpl.id !== currentId) {
            otherTextarea.value = JSON.stringify(val, null, 2);
          }
        });

        alert('✅ JSON synced successfully to all templates! You can now click "Test All" or test templates individually to view the custom data rendering.');
      } catch (err) {
        alert('❌ Invalid JSON format: ' + err.message);
      }
    }

    // ── Initialize ────────────────────────────────────────────────────────────────
    buildAll();
  </script>
</body>

</html>
