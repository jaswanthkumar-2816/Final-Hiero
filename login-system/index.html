<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hiero Frontend</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1D4ED8',
            secondary: '#6B7280',
          },
        },
      },
    }
  </script>
</head>
<body class="bg-gray-100 font-sans">
  <div id="root" class="min-h-screen"></div>

  <!-- CDN Dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios@1.6.2/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-router-dom@6.22.0/dist/umd/react-router-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.6/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const { BrowserRouter, Routes, Route, Link, useNavigate, useLocation } = ReactRouterDOM;

    const basePath = window.location.pathname.startsWith('/auth') ? '/auth' : '';

    // Axios Configuration
    const api = axios.create({
      baseURL: '', // use current origin (works on 2816 via gateway or 3000 directly)
      headers: { 'Content-Type': 'application/json' },
    });

    // Add JWT to requests if available
    api.interceptors.request.use((config) => {
      const token = localStorage.getItem('token');
      if (token) {
        config.headers.Authorization = `Bearer ${token}`;
      }
      return config;
    });

    // Navigation Component
    const Navbar = ({ isAuthenticated, setIsAuthenticated }) => {
      const navigate = useNavigate();

      const handleLogout = () => {
        localStorage.removeItem('token');
        setIsAuthenticated(false);
        navigate('/');
      };

      return (
        <nav class="bg-primary text-white p-4">
          <div class="container mx-auto flex justify-between items-center">
            <Link to="/" class="text-xl font-bold">Hiero</Link>
            <div>
              {isAuthenticated ? (
                <>
                  <Link to="/profile" class="mx-2 hover:underline">Profile</Link>
                  <Link to="/resume" class="mx-2 hover:underline">Resume</Link>
                  <button onClick={handleLogout} class="mx-2 hover:underline">Logout</button>
                </>
              ) : (
                <>
                  <Link to="/login" class="mx-2 hover:underline">Login</Link>
                  <Link to="/signup" class="mx-2 hover:underline">Signup</Link>
                </>
              )}
            </div>
          </div>
        </nav>
      );
    };

    // Signup Component
    const Signup = () => {
      const [formData, setFormData] = useState({ name: '', email: '', password: '', referralCode: '' });
      const [message, setMessage] = useState('');
      const [loading, setLoading] = useState(false);
      const [step, setStep] = useState('gate'); // 'gate' or 'form'
      const navigate = useNavigate();

      const handleChange = (e) => {
        setFormData({ ...formData, [e.target.name]: e.target.value });
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        setMessage('');
        
        try {
          const res = await api.post('/signup', formData);
          setMessage('✅ ' + res.data.message);
          setTimeout(() => navigate('/login'), 3000);
        } catch (err) {
          setMessage(`❌ ${err.response?.data?.error || 'Signup failed'}`);
        } finally {
          setLoading(false);
        }
      };

      if (step === 'gate') {
        return (
          <div className="container mx-auto p-4 max-w-md text-center py-20">
            <div className="mb-8">
              <div className="bg-primary text-white w-16 h-16 rounded-2xl flex items-center justify-center font-black text-3xl mx-auto mb-6 shadow-xl shadow-blue-200">H</div>
              <h2 className="text-3xl font-black text-gray-900 mb-3">Join Hiero</h2>
              <p className="text-gray-500 text-lg">Do you have a referral or invite code from a friend?</p>
            </div>
            
            <div className="space-y-4">
              <button 
                onClick={() => setStep('form')}
                className="w-full bg-primary text-white p-4 rounded-xl font-bold text-lg hover:shadow-lg transition-all"
              >
                Yes, I have a code
              </button>
              <button 
                onClick={() => { setFormData({...formData, referralCode: ''}); setStep('form'); }}
                className="w-full bg-white text-gray-700 border-2 border-gray-100 p-4 rounded-xl font-bold text-lg hover:bg-gray-50 transition-all"
              >
                No, I'm joining directly
              </button>
            </div>
            <p className="mt-8 text-gray-400 text-sm">Exclusive access for the next generation of professionals.</p>
          </div>
        );
      }

      return (
        <div className="container mx-auto p-4 max-w-md">
          <button onClick={() => setStep('gate')} className="text-gray-400 text-sm mb-4 flex items-center hover:text-primary transition-colors">
            ← Back
          </button>
          <h2 className="text-2xl font-bold mb-4">Create Account</h2>
          {message && (
            <div className={`p-3 mb-4 rounded ${message.startsWith('✅') ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
              {message}
            </div>
          )}
          <form onSubmit={handleSubmit} className="space-y-4">
            <input
              type="text"
              name="name"
              value={formData.name}
              onChange={handleChange}
              placeholder="Full Name"
              className="w-full p-2 border rounded focus:border-primary focus:outline-none"
              required
              disabled={loading}
            />
            <input
              type="email"
              name="email"
              value={formData.email}
              onChange={handleChange}
              placeholder="Email Address"
              className="w-full p-2 border rounded focus:border-primary focus:outline-none"
              required
              disabled={loading}
            />
            <input
              type="password"
              name="password"
              value={formData.password}
              onChange={handleChange}
              placeholder="Password"
              className="w-full p-2 border rounded focus:border-primary focus:outline-none"
              required
              disabled={loading}
              minLength="6"
            />
            <div className="pt-2">
              <label className="text-xs font-bold text-gray-500 uppercase px-1">Invitation Code</label>
              <input
                type="text"
                name="referralCode"
                value={formData.referralCode}
                onChange={handleChange}
                placeholder="HIERO-XXXX"
                className="w-full p-2 mt-1 border border-dashed border-gray-300 rounded focus:border-primary focus:outline-none bg-gray-50 uppercase font-mono font-bold"
                disabled={loading}
              />
            </div>
            <button 
              type="submit" 
              className="w-full bg-primary text-white p-2 rounded hover:bg-blue-700 disabled:opacity-50 font-bold"
              disabled={loading}
            >
              {loading ? 'Verifying...' : 'Complete Signup'}
            </button>
          </form>
          <div className="mt-4 text-center">
            <p className="text-gray-600">
              Already have an account? <Link to="/login" className="text-primary hover:underline font-bold">Sign in</Link>
            </p>
          </div>
        </div>
      );
    };

    // Login Component
    const Login = ({ setIsAuthenticated }) => {
      const [formData, setFormData] = useState({ email: '', password: '' });
      const [message, setMessage] = useState('');
      const [loading, setLoading] = useState(false);
      const navigate = useNavigate();
      const location = useLocation();

      useEffect(() => {
        // Check for verification success
        const params = new URLSearchParams(location.search);
        if (params.get('verified') === 'true') {
          setMessage('✅ Email verified successfully! You can now login.');
        }
      }, [location]);

      const handleChange = (e) => {
        setFormData({ ...formData, [e.target.name]: e.target.value });
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        setMessage('');
        
        try {
          const res = await api.post('/login', formData);
          localStorage.setItem('token', res.data.token);
          setIsAuthenticated(true);
          setMessage('✅ Login successful! Redirecting...');
          setTimeout(() => navigate('/profile'), 1000);
        } catch (err) {
          setMessage(`❌ ${err.response?.data?.error || 'Login failed'}`);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="container mx-auto p-4 max-w-md">
          <h2 className="text-2xl font-bold mb-4">Login</h2>
          {message && (
            <div className={`p-3 mb-4 rounded ${message.startsWith('✅') ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
              {message}
            </div>
          )}
          <form onSubmit={handleSubmit} className="space-y-4">
            <input
              type="email"
              name="email"
              value={formData.email}
              onChange={handleChange}
              placeholder="Email"
              className="w-full p-2 border rounded focus:border-primary focus:outline-none"
              required
              disabled={loading}
            />
            <input
              type="password"
              name="password"
              value={formData.password}
              onChange={handleChange}
              placeholder="Password"
              className="w-full p-2 border rounded focus:border-primary focus:outline-none"
              required
              disabled={loading}
            />
            <button 
              type="submit" 
              className="w-full bg-primary text-white p-2 rounded hover:bg-blue-700 disabled:opacity-50"
              disabled={loading}
            >
              {loading ? 'Signing in...' : 'Login'}
            </button>
          </form>
          <div className="mt-6 text-center">
            <p className="text-gray-600 mb-3">Or login with:</p>
            <a 
              href="http://localhost:2816/auth/google" 
              className="block bg-red-500 text-white p-2 rounded mt-2 hover:bg-red-600 transition-colors"
            >
              Continue with Google
            </a>
            <a 
              href="http://localhost:2816/auth/github" 
              className="block bg-gray-800 text-white p-2 rounded mt-2 hover:bg-gray-700 transition-colors"
            >
              Continue with GitHub
            </a>
          </div>
          <div className="mt-4 text-center">
            <p className="text-gray-600">
              Don't have an account? <Link to="/signup" className="text-primary hover:underline">Sign up</Link>
            </p>
          </div>
        </div>
      );
    };

    // Profile Component
    const Profile = () => {
      const [profile, setProfile] = useState(null);
      const [formData, setFormData] = useState({ name: '', bio: '', career: '' });
      const [profilePic, setProfilePic] = useState(null);
      const [message, setMessage] = useState('');
      const [verificationDoc, setVerificationDoc] = useState(null);

      useEffect(() => {
        const fetchProfile = async () => {
          try {
            const res = await api.get('/profile');
            setProfile(res.data);
            setFormData({ name: res.data.name, bio: res.data.bio, career: res.data.career });
          } catch (err) {
            setMessage('Failed to load profile');
          }
        };
        fetchProfile();
      }, []);

      const handleChange = (e) => {
        setFormData({ ...formData, [e.target.name]: e.target.value });
      };

      const handleFileChange = (e) => {
        setProfilePic(e.target.files[0]);
      };

      const handleVerificationDocChange = (e) => {
        setVerificationDoc(e.target.files[0]);
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        const formDataToSend = new FormData();
        formDataToSend.append('name', formData.name);
        formDataToSend.append('bio', formData.bio);
        formDataToSend.append('career', formData.career);
        if (profilePic) formDataToSend.append('profilePic', profilePic);

        try {
          await api.post('/profile', formDataToSend, {
            headers: { 'Content-Type': 'multipart/form-data' },
          });
          setMessage('Profile updated successfully');
          const res = await api.get('/profile');
          setProfile(res.data);
        } catch (err) {
          setMessage(err.response?.data?.error || 'Failed to update profile');
        }
      };

      const handleVerifyDocument = async (e) => {
        e.preventDefault();
        if (!verificationDoc) {
          setMessage('Please select a document');
          return;
        }
        const formDataToSend = new FormData();
        formDataToSend.append('verificationDoc', verificationDoc);

        try {
          await api.post('/verify-document', formDataToSend, {
            headers: { 'Content-Type': 'multipart/form-data' },
          });
          setMessage('Document submitted for verification');
          const res = await api.get('/profile');
          setProfile(res.data);
        } catch (err) {
          setMessage(err.response?.data?.error || 'Failed to submit document');
        }
      };

      const handleCreateResume = () => {
        if (profile.referredBy || localStorage.getItem('referral_skipping')) {
          window.location.href = '/domain-selection.html';
        } else {
          setShowRefGate(true);
        }
      };

      const handleClaimReferral = async () => {
        if (!pendingCode) return alert('Please enter an invitation code.');
        try {
          await api.post('/api/claim-referral', { referralCode: pendingCode });
          alert('✅ invitation verified! Perks applied.');
          window.location.href = '/domain-selection.html';
        } catch (err) {
          alert('❌ ' + (err.response?.data?.error || 'Invalid code.'));
        }
      };

      const handleSkip = () => {
        localStorage.setItem('referral_skipping', 'true');
        window.location.href = '/domain-selection.html';
      };

      if (!profile) return <div className="container mx-auto p-4">Loading...</div>;

      return (
        <div className="container mx-auto p-4 max-w-md">
          {/* Invitation Gate Modal */}
          {showRefGate && (
            <div className="fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center p-6 z-50">
              <div className="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
                <div className="w-16 h-16 bg-blue-600 text-white rounded-2xl flex items-center justify-center text-3xl font-black mx-auto mb-6">H</div>
                <h2 className="text-2xl font-bold mb-3">Invitation Check</h2>
                <p className="text-gray-500 mb-6">Welcome! Do you have an invitation code to unlock premium perks?</p>
                <input 
                  type="text" 
                  value={pendingCode}
                  onChange={(e) => setPendingCode(e.target.value)}
                  placeholder="HIERO-XXXX" 
                  className="w-full p-4 border-2 border-dashed border-gray-200 rounded-xl mb-6 text-center font-bold text-lg focus:border-blue-500 outline-none uppercase"
                />
                <button 
                  onClick={handleClaimReferral}
                  className="w-full bg-blue-600 text-white p-4 rounded-xl font-bold text-lg mb-3 shadow-lg shadow-blue-100"
                >
                  Verify & Continue
                </button>
                <button 
                  onClick={handleSkip}
                  className="w-full text-gray-400 font-bold p-2"
                >
                  No, proceed directly
                </button>
              </div>
            </div>
          )}

          <div className="flex items-center gap-4 mb-8">
            <div className="w-16 h-16 rounded-full overflow-hidden bg-gray-100 border-2 border-white shadow-sm">
              {profile.picture ? (
                <img src={profile.picture} alt="Profile" className="w-full h-full object-cover" />
              ) : (
                <div className="w-full h-full flex items-center justify-center bg-blue-100 text-blue-600 font-bold text-xl">
                  {profile.name[0]}
                </div>
              )}
            </div>
            <div>
              <h2 className="text-2xl font-bold">{profile.name}</h2>
              <p className="text-gray-500">{profile.email}</p>
            </div>
          </div>

          <div className="space-y-4">
             <button 
               onClick={handleCreateResume}
               className="w-full bg-blue-600 text-white p-4 rounded-xl font-bold text-lg shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all flex items-center justify-center gap-2"
             >
               <span>✨</span> Create Resume
             </button>
             <button className="w-full bg-white border-2 border-gray-100 p-4 rounded-xl font-bold text-lg text-gray-700 hover:bg-gray-50 transition-all flex items-center justify-center gap-2">
               <span>🔍</span> Analyze Resume
             </button>
          </div>

          <h2 class="text-2xl font-bold mb-4 mt-8">Profile Settings</h2>
          {message && <p class="text-red-500 mb-4">{message}</p>}
          <div class="mb-4">
            <p><strong>Email:</strong> {profile.email}</p>
            <p><strong>Email Verified:</strong> {profile.emailVerified ? 'Yes' : 'No'}</p>
            <p><strong>Account Verified:</strong> {profile.isVerified ? 'Yes' : 'No'}</p>
            <p><strong>Verification Status:</strong> {profile.verificationStatus}</p>
            
            {/* Referral Dashboard */}
            <div className="mt-6 p-4 bg-blue-50 border border-blue-100 rounded-xl">
              <h3 className="text-sm font-bold text-blue-800 uppercase tracking-wider mb-3">Ambassador Rewards</h3>
              <div className="flex justify-between items-center mb-2">
                <span className="text-sm text-blue-600">Your Referral Code:</span>
                <span className="font-mono font-bold text-blue-900 bg-white px-2 py-1 rounded border border-blue-200">{profile.referralCode}</span>
              </div>
              <div className="flex justify-between items-center">
                <span className="text-sm text-blue-600">Successful Referrals:</span>
                <span className="font-bold text-blue-900">{profile.referralCount || 0} / 10</span>
              </div>
              <div className="w-full bg-blue-200 h-2 rounded-full mt-3 overflow-hidden">
                <div 
                  className="bg-blue-600 h-full transition-all" 
                  style={{ width: `${Math.min(((profile.referralCount || 0) / 10) * 100, 100)}%` }}
                ></div>
              </div>
              <p className="text-[10px] text-blue-500 mt-2">Earn a Premium Pass after 10 successful referrals!</p>
            </div>

            {profile.profilePic && (
              <img src={`http://localhost:3000${profile.profilePic}`} alt="Profile" class="w-32 h-32 rounded-full mt-6" />
            )}
          </div>
          <form onSubmit={handleSubmit} class="space-y-4">
            <input
              type="text"
              name="name"
              value={formData.name}
              onChange={handleChange}
              placeholder="Name"
              class="w-full p-2 border rounded"
            />
            <textarea
              name="bio"
              value={formData.bio}
              onChange={handleChange}
              placeholder="Bio"
              class="w-full p-2 border rounded"
            ></textarea>
            <input
              type="text"
              name="career"
              value={formData.career}
              onChange={handleChange}
              placeholder="Career"
              class="w-full p-2 border rounded"
            />
            <input
              type="file"
              name="profilePic"
              onChange={handleFileChange}
              class="w-full p-2 border rounded"
            />
            <button type="submit" class="w-full bg-primary text-white p-2 rounded">
              Update Profile
            </button>
          </form>
          <form onSubmit={handleVerifyDocument} class="mt-4 space-y-4">
            <input
              type="file"
              name="verificationDoc"
              onChange={handleVerificationDocChange}
              class="w-full p-2 border rounded"
            />
            <button type="submit" class="w-full bg-secondary text-white p-2 rounded">
              Submit Verification Document
            </button>
          </form>
        </div>
      );
    };

    // Resume Component
    const Resume = () => {
      const [formData, setFormData] = useState({ title: '', description: '' });
      const [resume, setResume] = useState(null);
      const [message, setMessage] = useState('');
      const [resumeId, setResumeId] = useState(1); // For testing, assumes resume ID 1

      const handleChange = (e) => {
        setFormData({ ...formData, [e.target.name]: e.target.value });
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        try {
          const res = await api.post('/resume', formData);
          setMessage('Resume saved successfully');
          setResumeId(res.data.resumeId);
          fetchResume(res.data.resumeId);
        } catch (err) {
          setMessage(err.response?.data?.error || 'Failed to save resume');
        }
      };

      const fetchResume = async (id) => {
        try {
          const res = await api.get(`/resume/${id}`);
          setResume(res.data);
        } catch (err) {
          setMessage('Failed to load resume');
        }
      };

      useEffect(() => {
        fetchResume(resumeId);
      }, []);

      return (
        <div class="container mx-auto p-4 max-w-md">
          <h2 class="text-2xl font-bold mb-4">Resume</h2>
          {message && <p class="text-red-500 mb-4">{message}</p>}
          <form onSubmit={handleSubmit} class="space-y-4">
            <input
              type="text"
              name="title"
              value={formData.title}
              onChange={handleChange}
              placeholder="Resume Title"
              class="w-full p-2 border rounded"
              required
            />
            <textarea
              name="description"
              value={formData.description}
              onChange={handleChange}
              placeholder="Resume Description"
              class="w-full p-2 border rounded"
              required
            ></textarea>
            <button type="submit" class="w-full bg-primary text-white p-2 rounded">
              Save Resume
            </button>
          </form>
          {resume && (
            <div class="mt-4">
              <h3 class="text-xl font-bold">Saved Resume</h3>
              <p><strong>Title:</strong> {resume.title}</p>
              <p><strong>Description:</strong> {resume.description}</p>
            </div>
          )}
        </div>
      );
    };

    // Email Verification Component
    const VerifyEmail = () => {
      const [message, setMessage] = useState('Verifying email...');
      const location = useLocation();
      const navigate = useNavigate();

      useEffect(() => {
        const verify = async () => {
          const params = new URLSearchParams(location.search);
          const token = params.get('token');
          if (!token) {
            setMessage('Invalid verification link');
            return;
          }
          try {
            await api.get(`/verify-email?token=${token}`);
            setMessage('Email verified successfully! Redirecting to login...');
            setTimeout(() => navigate('/login'), 2000);
          } catch (err) {
            setMessage(err.response?.data?.error || 'Verification failed');
          }
        };
        verify();
      }, [location, navigate]);

      return (
        <div class="container mx-auto p-4 max-w-md">
          <h2 class="text-2xl font-bold mb-4">Email Verification</h2>
          <p>{message}</p>
        </div>
      );
    };

    // OAuth Callback Handler
    const OAuthCallback = ({ setIsAuthenticated }) => {
      const location = useLocation();
      const navigate = useNavigate();

      useEffect(() => {
        const params = new URLSearchParams(location.search);
        const token = params.get('token');
        const error = params.get('error');

        if (error) {
          navigate('/login', { state: { message: 'Authentication failed' } });
        } else if (token) {
          localStorage.setItem('token', token);
          setIsAuthenticated(true);
          navigate('/profile');
        }
      }, [location, navigate, setIsAuthenticated]);

      return <div class="container mx-auto p-4">Processing...</div>;
    };

    // Main App Component
    const App = () => {
      const [isAuthenticated, setIsAuthenticated] = useState(!!localStorage.getItem('token'));
      const location = useLocation();

      useEffect(() => {
        const params = new URLSearchParams(location.search);
        const error = params.get('error');
        if (error) {
          alert('Authentication failed');
        }
      }, [location]);

      return (
        <div class="min-h-screen">
          <Navbar isAuthenticated={isAuthenticated} setIsAuthenticated={setIsAuthenticated} />
          <Routes>
            <Route path="/" element={<div class="container mx-auto p-4"><h2 class="text-2xl">Welcome to Hiero</h2></div>} />
            <Route path="/signup" element={<Signup />} />
            <Route path="/login" element={<Login setIsAuthenticated={setIsAuthenticated} />} />
            <Route path="/profile" element={<Profile />} />
            <Route path="/resume" element={<Resume />} />
            <Route path="/verify-email" element={<VerifyEmail />} />
            <Route path="/auth/callback" element={<OAuthCallback setIsAuthenticated={setIsAuthenticated} />} />
          </Routes>
        </div>
      );
    };

    // Render the App
    ReactDOM.render(
      <BrowserRouter basename={basePath}>
        <App />
      </BrowserRouter>,
      document.getElementById('root')
    );
  </script>
